services:
  redis:
    image: redis:alpine
    container_name: mathmodelagent_redis
    command: redis-server --maxclients 10000 --timeout 300 --tcp-keepalive 60
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mathmodelagent_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev
    environment:
      - ENV=DEV
    volumes:
      - ./backend:/app
      - ./backend/project/work_dir:/app/project/work_dir
      - backend_venv:/app/.venv
    command: >-
      uv run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --ws-ping-interval 60
      --ws-ping-timeout 120
    depends_on:
      - redis
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mathmodelagent_frontend
    ports:
      - "5174:5174"
    env_file:
      - ./frontend/.env.development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["pnpm", "exec", "vite", "--host", "0.0.0.0", "--port", "5174", "--strictPort", "--no-open"]
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  redis_data:
  backend_venv:
  frontend_node_modules:
